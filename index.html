<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提示词框架生成器 - PromptX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
            color: #333;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 { color: white; font-size: 2.2rem; font-weight: 700; text-shadow: 0 2px 12px rgba(0,0,0,0.2); }
        .header p { color: rgba(255,255,255,0.88); font-size: 1rem; margin-top: 6px; }

        .container {
            max-width: 1380px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 24px;
            align-items: start;
        }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .card {
            background: white;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
        }

        /* ── LEFT PANEL ── */
        .left-panel h2 { font-size: 1.15rem; font-weight: 700; color: #2d3748; margin-bottom: 4px; }
        .left-panel .subtitle { font-size: 0.85rem; color: #718096; margin-bottom: 20px; }

        .input-label { font-size: 0.8rem; font-weight: 600; color: #4a5568; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px; display: block; }

        textarea#userDesc {
            width: 100%;
            min-height: 130px;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.97rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color .2s;
            line-height: 1.6;
            color: #2d3748;
        }
        textarea#userDesc:focus { outline: none; border-color: #667eea; }
        textarea#userDesc::placeholder { color: #a0aec0; }

        .example-section { margin-top: 14px; }
        .example-section-header { margin-bottom: 10px; }
        .example-hint { font-size: 0.78rem; color: #a0aec0; font-weight: 500; }

        .role-groups { display: flex; flex-direction: column; gap: 8px; }
        .role-group { display: flex; align-items: flex-start; gap: 8px; }
        .role-label {
            flex-shrink: 0;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            margin-top: 2px;
            letter-spacing: .03em;
            width: 36px;
            text-align: center;
        }
        .role-product { background: #bee3f8; color: #2b6cb0; }
        .role-dev     { background: #c6f6d5; color: #276749; }
        .role-ops     { background: #feebc8; color: #c05621; }
        .role-merch   { background: #e9d8fd; color: #553c9a; }
        .role-qa      { background: #fed7d7; color: #c53030; }
        .role-report  { background: #e2e8f0; color: #2d3748; }

        .role-chips { display: flex; flex-wrap: wrap; gap: 5px; }
        .chip-example {
            background: #f7fafc;
            color: #4a5568;
            border: 1px solid #e2e8f0;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.76rem;
            cursor: pointer;
            transition: background .15s, color .15s, border-color .15s;
            white-space: nowrap;
        }
        .chip-example:hover { background: #667eea; color: white; border-color: #667eea; }

        .btn-analyze {
            width: 100%;
            margin-top: 18px;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-analyze:hover { opacity: .9; transform: translateY(-1px); }
        .btn-analyze:disabled { opacity: .6; cursor: not-allowed; transform: none; }

        /* detected tags */
        .detected-section { margin-top: 22px; border-top: 1px solid #f0f0f0; padding-top: 18px; }
        .detected-section h3 { font-size: 0.8rem; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
        .detected-row { display: flex; flex-direction: column; gap: 10px; }
        .detected-item { display: flex; flex-direction: column; gap: 4px; }
        .det-label { font-size: 0.75rem; color: #a0aec0; font-weight: 600; }
        .det-tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .det-tag {
            background: linear-gradient(135deg, rgba(102,126,234,.12), rgba(118,75,162,.12));
            color: #553c9a;
            border: 1px solid rgba(118,75,162,.2);
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
        }
        .det-tag.empty { color: #a0aec0; background: #f7fafc; border-color: #e2e8f0; }

        /* ── RIGHT PANEL ── */
        .right-panel .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #f0f0f0;
        }
        .right-panel .panel-header h2 { font-size: 1.15rem; font-weight: 700; color: #2d3748; }

        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 60px 20px; color: #a0aec0;
            text-align: center;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 14px; opacity: .5; }
        .empty-state p { font-size: 0.95rem; line-height: 1.6; }

        /* skeleton */
        .skeleton-wrap { display: flex; flex-direction: column; gap: 14px; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* result */
        .result-wrap { display: flex; flex-direction: column; gap: 20px; }

        /* top recommendation */
        .top-rec {
            border: 2px solid #667eea;
            border-radius: 14px;
            padding: 22px;
            background: linear-gradient(135deg, rgba(102,126,234,.04), rgba(118,75,162,.04));
        }
        .top-rec-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
        .rec-title-block { display: flex; flex-direction: column; gap: 4px; }
        .rec-rank { font-size: 0.72rem; font-weight: 700; color: #667eea; text-transform: uppercase; letter-spacing: .08em; }
        .rec-name { font-size: 1.4rem; font-weight: 800; color: #2d3748; }
        .rec-category {
            display: inline-block;
            background: #e9d8fd;
            color: #553c9a;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.76rem;
            font-weight: 600;
        }
        .score-circle {
            flex-shrink: 0;
            width: 64px; height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white;
        }
        .score-circle .score-num { font-size: 1.3rem; font-weight: 800; line-height: 1; }
        .score-circle .score-denom { font-size: 0.65rem; opacity: .8; }

        .rec-desc { font-size: 0.9rem; color: #4a5568; line-height: 1.7; margin-bottom: 16px; }

        /* reasoning */
        .reasoning-box {
            background: #fffbeb;
            border: 1px solid #fbd38d;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 16px;
        }
        .reasoning-box .box-title { font-size: 0.78rem; font-weight: 700; color: #b7791f; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
        .reasoning-box p { font-size: 0.88rem; color: #744210; line-height: 1.7; }

        /* score breakdown */
        .score-breakdown { margin-bottom: 16px; }
        .score-breakdown .box-title { font-size: 0.78rem; font-weight: 700; color: #4a5568; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .score-rows { display: flex; flex-direction: column; gap: 7px; }
        .score-row { display: flex; align-items: center; gap: 10px; }
        .score-row-label { font-size: 0.78rem; color: #718096; width: 90px; flex-shrink: 0; }
        .score-bar-wrap { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .score-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #667eea, #764ba2); transition: width .6s ease; }
        .score-row-val { font-size: 0.78rem; font-weight: 700; color: #4a5568; width: 38px; text-align: right; flex-shrink: 0; }

        /* sample prompt */
        .prompt-box { background: #f0fff4; border: 1px solid #9ae6b4; border-radius: 10px; overflow: hidden; }
        .prompt-box-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; background: #c6f6d5; border-bottom: 1px solid #9ae6b4;
        }
        .prompt-box-header .box-title { font-size: 0.78rem; font-weight: 700; color: #276749; display: flex; align-items: center; gap: 5px; margin: 0; }
        .btn-copy {
            background: #38a169; color: white; border: none; padding: 5px 12px;
            border-radius: 6px; font-size: 0.78rem; font-weight: 600; cursor: pointer;
            transition: background .15s;
        }
        .btn-copy:hover { background: #276749; }
        .btn-copy.copied { background: #276749; }
        .prompt-content {
            padding: 14px 16px;
            font-family: 'Courier New', monospace;
            font-size: 0.83rem;
            color: #2d3748;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.7;
            max-height: 280px;
            overflow-y: auto;
        }

        /* alternatives */
        .alts-section { display: flex; flex-direction: column; gap: 10px; }
        .alts-label { font-size: 0.8rem; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: .05em; }
        .alt-item {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: border-color .15s;
            cursor: pointer;
        }
        .alt-item:hover { border-color: #667eea; }
        .alt-score-badge {
            flex-shrink: 0;
            background: #e2e8f0;
            color: #4a5568;
            font-size: 0.8rem;
            font-weight: 700;
            width: 44px; height: 44px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .alt-info { flex: 1; }
        .alt-name { font-size: 0.95rem; font-weight: 700; color: #2d3748; }
        .alt-reason { font-size: 0.8rem; color: #718096; margin-top: 2px; line-height: 1.5; }
        .alt-cat { font-size: 0.72rem; color: #9b59b6; font-weight: 600; background: #e9d8fd; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 4px; }

        /* notification */
        .notification {
            position: fixed; top: 20px; right: 20px;
            background: white; border-radius: 10px; padding: 12px 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,.15);
            transform: translateX(350px); transition: transform .3s;
            z-index: 100; font-size: 0.88rem; color: #2d3748; font-weight: 500;
        }
        .notification.show { transform: translateX(0); }

        /* spinner */
        .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <h1>🧠 PromptX 框架推荐器</h1>
    <p>滔搏 · 内部提示词框架工具 &nbsp;|&nbsp; 描述您的工作任务，AI 自动匹配最合适的框架并生成示范 Prompt</p>
</div>

<div class="container">
    <!-- LEFT PANEL -->
    <div class="card left-panel">
        <h2>💬 描述您的需求</h2>
        <p class="subtitle">直接用自己的话描述任务，AI 自动分析并推荐最合适的框架</p>

        <label class="input-label" for="userDesc">描述您想做什么</label>
        <textarea id="userDesc" placeholder="用自然语言描述您的任务，例如：&#10;&#10;我想分析本季度各门店的库存周转情况，找出积压商品并制定清货策略…&#10;&#10;或者：帮我设计一个新功能的测试方案，覆盖主流程和边界场景…"></textarea>

        <div class="example-section">
            <div class="example-section-header">
                <span class="example-hint">💡 快捷示例（按岗位选择，也可直接在上方输入）</span>
            </div>
            <div class="role-groups">
                <div class="role-group">
                    <span class="role-label role-product">产品</span>
                    <div class="role-chips">
                        <button class="chip-example" onclick="fillExample(this)" data-key="product1">分析用户反馈优化功能</button>
                        <button class="chip-example" onclick="fillExample(this)" data-key="product2">撰写新功能需求文档</button>
                    </div>
                </div>
                <div class="role-group">
                    <span class="role-label role-dev">开发</span>
                    <div class="role-chips">
                        <button class="chip-example" onclick="fillExample(this)" data-key="dev1">制定技术方案评审</button>
                        <button class="chip-example" onclick="fillExample(this)" data-key="dev2">排查线上接口异常</button>
                    </div>
                </div>
                <div class="role-group">
                    <span class="role-label role-qa">测试</span>
                    <div class="role-chips">
                        <button class="chip-example" onclick="fillExample(this)" data-key="qa1">编写功能测试用例</button>
                        <button class="chip-example" onclick="fillExample(this)" data-key="qa2">设计回归测试方案</button>
                    </div>
                </div>
                <div class="role-group">
                    <span class="role-label role-ops">运营</span>
                    <div class="role-chips">
                        <button class="chip-example" onclick="fillExample(this)" data-key="ops1">策划大促活动方案</button>
                        <button class="chip-example" onclick="fillExample(this)" data-key="ops2">分析门店销售数据</button>
                    </div>
                </div>
                <div class="role-group">
                    <span class="role-label role-merch">货品</span>
                    <div class="role-chips">
                        <button class="chip-example" onclick="fillExample(this)" data-key="merch1">制定补货与库存策略</button>
                        <button class="chip-example" onclick="fillExample(this)" data-key="merch2">分析滞销品清货方案</button>
                    </div>
                </div>
                <div class="role-group">
                    <span class="role-label role-report">报告</span>
                    <div class="role-chips">
                        <button class="chip-example" onclick="fillExample(this)" data-key="report1">撰写项目复盘总结</button>
                        <button class="chip-example" onclick="fillExample(this)" data-key="report2">生成周期业务汇报</button>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn-analyze" id="analyzeBtn" onclick="analyzeWithAI()">
            <span id="btnIcon">✨</span>
            <span id="btnText">AI 智能分析并推荐框架</span>
        </button>

        <!-- detected tags section -->
        <div class="detected-section" id="detectedSection" style="display:none;">
            <h3>🔍 AI 识别结果</h3>
            <div class="detected-row">
                <div class="detected-item">
                    <span class="det-label">任务领域</span>
                    <div class="det-tags" id="detDomains"></div>
                </div>
                <div class="detected-item">
                    <span class="det-label">任务类型</span>
                    <div class="det-tags" id="detTaskType"></div>
                </div>
                <div class="detected-item">
                    <span class="det-label">复杂度</span>
                    <div class="det-tags" id="detComplexity"></div>
                </div>
                <div class="detected-item">
                    <span class="det-label">核心关键词</span>
                    <div class="det-tags" id="detKeywords"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="card right-panel">
        <div class="panel-header">
            <h2>🏆 推荐框架</h2>
            <div id="topScoreBadge" style="font-size:0.82rem;color:#a0aec0;">等待分析...</div>
        </div>

        <div id="resultsArea">
            <div class="empty-state">
                <div class="icon">🎯</div>
                <p>在左侧输入您的需求<br>AI 将自动分析并推荐最合适的框架<br><br><span style="font-size:0.82rem;color:#cbd5e0;">无需手动勾选任何分类</span></p>
            </div>
        </div>
    </div>
</div>

<div class="notification" id="notification"></div>

<script>
const FRAMEWORKS = [
    {
        id: 1, name: "PEE框架", category: "技术分析",
        description: "通过结构化论证构建分析性响应（论点 → 证据 → 解释）",
        domains: ["technical","education"], taskTypes: ["analysis"],
        keywords: ["分析","评估","数据","证据","论证","检查","评价"],
        complexity: "simple", examples: 1,
        samplePrompt: (desc) => `请使用 PEE 框架（论点-证据-解释）对以下内容进行结构化分析：

任务背景：${desc}

请按以下结构输出：

【论点 Point】
明确陈述核心主张或评估结论

【证据 Evidence】
列举支持论点的具体数据、事实或案例

【解释 Explanation】
说明证据如何支撑论点，并分析其深层含义与影响

请确保三个部分逻辑紧密，形成完整的分析闭环。`
    },
    {
        id: 2, name: "CRISPE框架", category: "提示工程",
        description: "结构化 AI 交互的综合框架（能力-角色-身份-风格-目的-示例）",
        domains: ["technical","creative"], taskTypes: ["prompt_engineering"],
        keywords: ["提示词","AI","角色","优化","交互","指令"],
        complexity: "medium", examples: 2,
        samplePrompt: (desc) => `请使用 CRISPE 框架为以下需求生成一个高质量的 AI 提示词：

需求描述：${desc}

按照以下结构输出：

【Capacity 能力】AI 需要具备的核心能力
【Role 角色】AI 应扮演的专业角色
【Identity 身份】详细的背景、经验和专业知识
【Style 风格】期望的表达风格和语气
【Purpose 目的】本次交互的具体目标
【Examples 示例】理想输出的参考样本（如有）

最终输出完整的提示词文本。`
    },
    {
        id: 3, name: "RICE框架", category: "决策制定",
        description: "基于量化评分进行优先级排序（覆盖范围-影响-信心-工作量）",
        domains: ["business","technical"], taskTypes: ["decision_making"],
        keywords: ["优先级","决策","排序","功能","评估","选择","规划"],
        complexity: "medium", examples: 1,
        samplePrompt: (desc) => `请使用 RICE 框架对以下决策场景进行量化评估：

任务背景：${desc}

对每个待选项，请分别评估：

【Reach 覆盖范围】预计影响的用户数量（人/季度）
【Impact 影响程度】对核心指标的影响（0.25=微弱 / 0.5=低 / 1=中 / 2=高 / 3=极高）
【Confidence 信心度】对以上估计的把握程度（50% / 80% / 100%）
【Effort 工作量】所需人力（人·月 或 人·周）

RICE 得分 = (Reach × Impact × Confidence) ÷ Effort

请输出每个选项的 RICE 得分和最终优先级排序，并给出选择理由。`
    },
    {
        id: 4, name: "SCAMPER框架", category: "创意头脑风暴",
        description: "通过 7 种创新技术激发创意（替换-结合-调整-修改-其他用途-消除-反转）",
        domains: ["creative","business"], taskTypes: ["brainstorming"],
        keywords: ["创新","创意","改进","想法","头脑风暴","设计","产品"],
        complexity: "complex", examples: 1,
        samplePrompt: (desc) => `请使用 SCAMPER 框架对以下主题进行全面的创意探索：

主题/对象：${desc}

请依次从 7 个维度展开思考，每个维度给出 2-3 个具体创意：

【Substitute 替换】可以用什么替代现有元素？
【Combine 结合】可以与哪些事物融合？
【Adapt 调整】可以借鉴哪些领域的做法？
【Modify/Magnify 修改/放大】可以强化或改变什么特性？
【Put to other uses 其他用途】还能用在哪些场景？
【Eliminate 消除】可以去掉哪些不必要的部分？
【Reverse/Rearrange 反转/重组】颠倒或重新排列会产生什么？

最后综合最有价值的创意，给出 Top 3 落地建议。`
    },
    {
        id: 5, name: "BAB框架", category: "提示工程",
        description: "简洁高效的提示结构（背景-询问-收益）",
        domains: ["business","technical"], taskTypes: ["prompt_engineering"],

function buildSystemPrompt() {
    const fwData = FRAMEWORKS.map(f => ({
        id: f.id, name: f.name, category: f.category,
        domains: f.domains, taskTypes: f.taskTypes,
        keywords: f.keywords, complexity: f.complexity
    }));
    return [
        "You are a prompt framework recommendation expert.",
        "Analyze the user task description (in Chinese) and return ONLY a JSON object — no markdown, no code fences, no explanation.",
        "Start your response with { and end with }.",
        "",
        "FRAMEWORKS: " + JSON.stringify(fwData),
        "",
        "SCORING: domain_match=30%, task_type=25%, keyword=20%, complexity=15%, examples_bonus=10%",
        "",
        'REQUIRED JSON (all numeric fields must be plain numbers, not strings):',
        '{"detected":{"domains":["中文领域名，如教育/学习、商业/营销、技术/工程、创意/设计、决策制定、问题解决"],"taskType":"中文任务类型字符串","complexity":"简单 or 中等 or 复杂","keywords":["3-5个中文关键词"]},"topFramework":{"id":1,"score":85,"reasoning":"2-3句中文推荐理由","scoreBreakdown":{"domain":80,"task":100,"keyword":60,"complexity":100,"examples":10}},"alternatives":[{"id":2,"score":70,"reason":"一句中文"},{"id":3,"score":60,"reason":"一句中文"}]}',
        "",
        "Replace the example values with real analysis. alternatives must have exactly 2 items."
    ].join("\n");
}

let lastAnalysis = null;
let lastDesc = '';

async function analyzeWithAI() {
    const desc = document.getElementById('userDesc').value.trim();
    if (!desc) {
        showNotification('请先输入您的任务描述');
        return;
    }

    const btn = document.getElementById('analyzeBtn');
    const btnIcon = document.getElementById('btnIcon');
    const btnText = document.getElementById('btnText');
    btn.disabled = true;
    btnIcon.innerHTML = '<span class="spin"></span>';
    btnText.textContent = 'AI 分析中...';

    showSkeleton();

    try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 1200,
                system: buildSystemPrompt(),
                messages: [{ role: 'user', content: `分析需求并推荐框架：\n\n${desc}` }]
            })
        });

        const data = await response.json();
        console.log('[PromptX] API response:', JSON.stringify(data, null, 2));

        // Handle API-level errors
        if (!response.ok || data.type === 'error') {
            const errMsg = data.error?.message || `API错误 HTTP ${response.status}`;
            throw new Error(errMsg);
        }

        // Guard: content array missing
        if (!Array.isArray(data.content) || data.content.length === 0) {
            console.error('[PromptX] Unexpected response shape:', data);
            throw new Error(`响应结构异常：缺少 content 字段（详见控制台）`);
        }

        const raw = data.content[0]?.text || '';
        console.log('[PromptX] Raw text:', raw);

        // Robust JSON extraction: try multiple strategies
        let result = null;

        // Strategy 1: direct parse after stripping markdown fences
        try {
            const clean = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
            result = JSON.parse(clean);
        } catch(_) {}

        // Strategy 2: extract first {...} block with regex
        if (!result) {
            const match = raw.match(/\{[\s\S]*\}/);
            if (match) {
                try { result = JSON.parse(match[0]); } catch(_) {}
            }
        }

        if (!result) {
            console.error('[PromptX] Could not parse JSON from:', raw);
            throw new Error(`JSON 解析失败。原始响应：${raw.slice(0, 200)}`);
        }

        // Validate required fields
        if (!result.topFramework?.id || !result.detected) {
            throw new Error('AI 返回数据不完整，请重试');
        }

        lastAnalysis = result;
        lastDesc = desc;
        renderDetected(result.detected);
        renderResults(result, desc);

    } catch(err) {
        console.error('[PromptX] Error:', err);
        document.getElementById('resultsArea').innerHTML = `
            <div class="empty-state">
                <div class="icon">⚠️</div>
                <p style="color:#e53e3e;margin-bottom:8px"><strong>分析失败</strong></p>
                <pre style="color:#718096;font-size:0.78rem;white-space:pre-wrap;word-break:break-all;background:#f7fafc;padding:10px;border-radius:6px;max-height:160px;overflow-y:auto;text-align:left">${err.message || '请稍后重试'}</pre>
            </div>`;
    } finally {
        btn.disabled = false;
        btnIcon.textContent = '✨';
        btnText.textContent = 'AI 智能分析并推荐框架';
    }
}

function showSkeleton() {
    document.getElementById('topScoreBadge').textContent = '分析中...';
    document.getElementById('resultsArea').innerHTML = `
        <div class="skeleton-wrap">
            <div class="skeleton" style="height:200px"></div>
            <div class="skeleton" style="height:120px"></div>
            <div class="skeleton" style="height:160px"></div>
            <div class="skeleton" style="height:90px"></div>
        </div>`;
}

function renderDetected(detected) {
    const section = document.getElementById('detectedSection');
    section.style.display = 'block';

    const render = (id, items) => {
        const el = document.getElementById(id);
        if (!items || (Array.isArray(items) && items.length === 0)) {
            el.innerHTML = '<span class="det-tag empty">未识别</span>';
        } else {
            const arr = Array.isArray(items) ? items : [items];
            el.innerHTML = arr.map(t => `<span class="det-tag">${t}</span>`).join('');
        }
    };

    render('detDomains', detected.domains);
    render('detTaskType', detected.taskType);
    render('detComplexity', detected.complexity);
    render('detKeywords', detected.keywords);
}

function renderResults(result, userDesc) {
    const top = FRAMEWORKS.find(f => f.id === result.topFramework.id);
    if (!top) return;

    const score = result.topFramework.score;
    const breakdown = result.topFramework.scoreBreakdown;
    const samplePrompt = top.samplePrompt(userDesc);

    document.getElementById('topScoreBadge').innerHTML = `
        <span style="color:#667eea;font-weight:700">匹配度 ${score}/100</span>`;

    const altsHtml = (result.alternatives || []).map(alt => {
        const fw = FRAMEWORKS.find(f => f.id === alt.id);
        if (!fw) return '';
        return `
        <div class="alt-item" onclick="showAltPrompt(${alt.id}, '${escHtml(userDesc)}')">
            <div class="alt-score-badge">${alt.score}</div>
            <div class="alt-info">
                <div class="alt-name">${fw.name}</div>
                <span class="alt-cat">${fw.category}</span>
                <div class="alt-reason">${alt.reason}</div>
            </div>
            <span style="color:#cbd5e0;font-size:1.1rem">›</span>
        </div>`;
    }).join('');

    document.getElementById('resultsArea').innerHTML = `
        <div class="result-wrap">
            <!-- TOP RECOMMENDATION -->
            <div class="top-rec">
                <div class="top-rec-header">
                    <div class="rec-title-block">
                        <span class="rec-rank">🥇 首选推荐</span>
                        <div class="rec-name">${top.name}</div>
                        <span class="rec-category">${top.category}</span>
                    </div>
                    <div class="score-circle">
                        <span class="score-num">${score}</span>
                        <span class="score-denom">/100</span>
                    </div>
                </div>

                <p class="rec-desc">${top.description}</p>

                <!-- REASONING -->
                <div class="reasoning-box">
                    <div class="box-title">💡 推荐理由</div>
                    <p>${result.topFramework.reasoning}</p>
                </div>

                <!-- SCORE BREAKDOWN -->
                <div class="score-breakdown">
                    <div class="box-title">📊 匹配分析</div>
                    <div class="score-rows">
                        ${scoreRow('领域匹配 (30%)', breakdown.domain, 100)}
                        ${scoreRow('任务类型 (25%)', breakdown.task, 100)}
                        ${scoreRow('关键词 (20%)', breakdown.keyword, 100)}
                        ${scoreRow('复杂度 (15%)', breakdown.complexity, 100)}
                        ${scoreRow('示例加分 (10%)', breakdown.examples, 10)}
                    </div>
                </div>

                <!-- SAMPLE PROMPT -->
                <div class="prompt-box">
                    <div class="prompt-box-header">
                        <div class="box-title">📋 示范 Prompt（可直接使用）</div>
                        <button class="btn-copy" onclick="copyPrompt(this)" data-text="${escAttr(samplePrompt)}">复制</button>
                    </div>
                    <div class="prompt-content">${escHtml(samplePrompt)}</div>
                </div>
            </div>

            <!-- ALTERNATIVES -->
            ${altsHtml ? `
            <div class="alts-section">
                <div class="alts-label">其他可选框架</div>
                ${altsHtml}
            </div>` : ''}
        </div>`;
}

function scoreRow(label, val, max) {
    const pct = Math.round((val / max) * 100);
    return `
        <div class="score-row">
            <span class="score-row-label">${label}</span>
            <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${pct}%"></div></div>
            <span class="score-row-val">${val}${max === 10 ? '' : '%'}</span>
        </div>`;
}

function showAltPrompt(fwId, userDesc) {
    const fw = FRAMEWORKS.find(f => f.id === fwId);
    if (!fw || !lastAnalysis) return;

    // find alt score
    const alt = lastAnalysis.alternatives?.find(a => a.id === fwId);
    const score = alt?.score || '?';

    const samplePrompt = fw.samplePrompt(userDesc);

    document.getElementById('resultsArea').innerHTML = `
        <div class="result-wrap">
            <div style="margin-bottom:12px">
                <button onclick="renderResults(lastAnalysis, '${escAttr(userDesc)}')"
                    style="background:none;border:none;color:#667eea;font-weight:600;cursor:pointer;font-size:0.88rem;">← 返回首选推荐</button>
            </div>
            <div class="top-rec" style="border-color:#a0aec0">
                <div class="top-rec-header">
                    <div class="rec-title-block">
                        <span class="rec-rank" style="color:#a0aec0">备选框架</span>
                        <div class="rec-name">${fw.name}</div>
                        <span class="rec-category">${fw.category}</span>
                    </div>
                    <div class="score-circle" style="background:linear-gradient(135deg,#a0aec0,#718096)">
                        <span class="score-num">${score}</span>
                        <span class="score-denom">/100</span>
                    </div>
                </div>
                <p class="rec-desc">${fw.description}</p>
                <div class="prompt-box">
                    <div class="prompt-box-header">
                        <div class="box-title">📋 示范 Prompt</div>
                        <button class="btn-copy" onclick="copyPrompt(this)" data-text="${escAttr(samplePrompt)}">复制</button>
                    </div>
                    <div class="prompt-content">${escHtml(samplePrompt)}</div>
                </div>
            </div>
        </div>`;
}

function copyPrompt(btn) {
    const text = btn.getAttribute('data-text');
    navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✅ 已复制';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
    });
}

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
    return String(str).replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/\n/g,'\\n');
}

function showNotification(msg) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.classList.add('show');
    setTimeout(() => n.classList.remove('show'), 2500);
}
